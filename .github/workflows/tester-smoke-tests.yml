name: Smoke Test Runner with Smart Selection

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number
        required: true
        type: string
      pr_title:
        description: Pull request title
        required: true
        type: string
      pr_url:
        description: Pull request URL
        required: true
        type: string
      source_repo:
        description: Source repository
        required: true
        type: string
      head_sha:
        description: Source commit SHA
        required: true
        type: string

jobs:
  smart-test-run:
    runs-on: self-hosted

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout tester repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn httpx

      - name: Install and start Ollama
        shell: pwsh
        run: |
          Write-Host "[ACTION] Setting up Ollama..."
          $ollamaCmd = Get-Command ollama -ErrorAction SilentlyContinue
          
          if ($null -ne $ollamaCmd) {
              Write-Host "[OK] Ollama already installed"
          } else {
              Write-Host "[WARN] Ollama not found in PATH. Please install from https://ollama.ai"
              Write-Host "      After installation, restart the runner and try again."
              exit 0
          }
          
          Write-Host "[ACTION] Starting Ollama service..."
          try {
              Start-Process -FilePath "ollama" -ArgumentList "serve" -WindowStyle Hidden -ErrorAction SilentlyContinue
              Start-Sleep -Seconds 3
              Write-Host "[OK] Ollama service started"
          } catch {
              Write-Host "[WARN] Could not start Ollama service: $_"
          }

      - name: Pull TinyLlama model
        shell: pwsh
        continue-on-error: true
        run: |
          Write-Host "[ACTION] Pulling TinyLlama model (637 MB - much faster)..."
          
          try {
              ollama pull tinyllama
              Write-Host "[OK] TinyLlama model ready"
          } catch {
              Write-Host "[WARN] Could not pull model: $_"
          }

      - name: Start FastAPI server
        shell: pwsh
        run: |
          $pythonExe = (Get-Command python).Source
          $serverScript = "${{ github.workspace }}\ollama-test-selector.py"
          
          Write-Host "[ACTION] Starting Ollama-based test selector..."
          
          # Start server in background using Start-Job
          $job = Start-Job -ScriptBlock {
              param($python, $script)
              & $python $script
          } -ArgumentList $pythonExe, $serverScript
          
          Write-Host "[OK] FastAPI server started (Job ID: $($job.Id))"
          Start-Sleep -Seconds 2
        continue-on-error: true

      - name: Verify smart-test-engine availability
        shell: python
        env:
          PYTHONIOENCODING: utf-8
        run: |
          import urllib.request
          import urllib.error
          import time
          
          print("[ACTION] Verifying Smart Test Engine availability...")
          max_retries = 10
          retry_delay = 3
          
          for attempt in range(1, max_retries + 1):
              try:
                  request = urllib.request.Request(
                      "http://localhost:8000/health",
                      method="GET",
                      headers={"User-Agent": "smart-test-selection-runner"}
                  )
                  with urllib.request.urlopen(request, timeout=5) as response:
                      result = response.read().decode("utf-8")
                      print(f"[OK] Smart Test Engine is running and healthy")
                      break
              except Exception as e:
                  if attempt < max_retries:
                      print(f"   Attempt {attempt}/{max_retries}: Waiting for engine... ({type(e).__name__})")
                      time.sleep(retry_delay)
                  else:
                      print(f"[WARN] Smart Test Engine not responding after {max_retries} attempts")
                      print(f"   Error: {type(e).__name__}: {e}")
                      print(f"   Will use fallback file-based test selection")
        continue-on-error: true

      - name: Fetch changed files from source PR
        id: changed-files
        shell: python
        env:
          PYTHONIOENCODING: utf-8
          SOURCE_REPO: ${{ github.event.inputs.source_repo }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          SOURCE_REPO_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
        run: |
          import json
          import os
          import urllib.error
          import urllib.request

          repo = os.environ["SOURCE_REPO"]
          token = os.environ.get("SOURCE_REPO_TOKEN", "")
          pr_number = os.environ["PR_NUMBER"]
          url = f"https://api.github.com/repos/{repo}/pulls/{pr_number}/files?per_page=100"

          headers = {
            "Accept": "application/vnd.github+json",
            "User-Agent": "smart-test-selection-runner"
          }
          if token:
            headers["Authorization"] = f"Bearer {token}"

          changed = []
          page = 1
          try:
            while True:
              request = urllib.request.Request(f"{url}&page={page}", headers=headers)
              with urllib.request.urlopen(request) as response:
                payload = json.loads(response.read().decode("utf-8"))
              if not payload:
                break
              changed.extend(item["filename"] for item in payload if item.get("filename"))
              if len(payload) < 100:
                break
              page += 1
          except urllib.error.HTTPError as exc:
            print(f"Warning: PR file fetch failed with HTTP {exc.code}; continuing with empty change list")
          except Exception as exc:
            print(f"Warning: PR file fetch failed ({exc}); continuing with empty change list")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as stream:
            stream.write(f"changed_files={','.join(changed)}\n")

      - name: Run smart selection engine
        id: select-tests
        continue-on-error: true
        shell: python
        env:
          PYTHONIOENCODING: utf-8
          CHANGED_FILES: ${{ steps.changed-files.outputs.changed_files }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          PR_TITLE: ${{ github.event.inputs.pr_title }}
          PR_URL: ${{ github.event.inputs.pr_url }}
        run: |
          import json
          import os
          import urllib.error
          import urllib.request
          import time
          
          print("=" * 80)
          print("SMART TEST SELECTION ENGINE - ML Ranking & RAG-Based Retrieval")
          print("=" * 80)
          
          # Prepare request data
          changed_files_str = os.environ.get("CHANGED_FILES", "")
          changed_files = [f.strip() for f in changed_files_str.split(",") if f.strip()]
          
          print(f"\n[INFO] Changed files detected: {len(changed_files)}")
          for f in changed_files[:5]:
              print(f"   - {f}")
          if len(changed_files) > 5:
              print(f"   ... and {len(changed_files) - 5} more")
          
          payload = {
              "pr_number": os.environ.get("PR_NUMBER", "0"),
              "pr_title": os.environ.get("PR_TITLE", ""),
              "pr_description": os.environ.get("PR_URL", ""),
              "changed_files": changed_files,
              "request_type": "smart_selection"
          }
          
          # Try to call smart-test-engine API
          api_url = "http://localhost:8000/api/v1/select-tests"
          fallback_used = False
          selected_tests = []
          explanations = []
          
          try:
              print(f"\n[ACTION] Calling Smart Test Engine API: {api_url}")
              request_data = json.dumps(payload).encode('utf-8')
              request = urllib.request.Request(
                  api_url,
                  data=request_data,
                  headers={
                      "Content-Type": "application/json",
                      "User-Agent": "smart-test-selection-runner"
                  },
                  method="POST"
              )
              
              # Try with longer timeout for ML processing
              with urllib.request.urlopen(request, timeout=60) as response:
                  result = json.loads(response.read().decode("utf-8"))
                  
                  print("\n[OK] Smart Test Engine Response:")
                  print(f"   Status: {result.get('status', 'unknown')}")
                  
                  # Extract ML-ranked tests
                  selected_tests = result.get("selected_tests", [])
                  explanations = result.get("explanations", [])
                  
                  print(f"\n[RESULT] ML-Ranked Test Selection ({len(selected_tests)} tests):")
                  for i, test in enumerate(selected_tests, 1):
                      print(f"\n   {i}. {test}")
                      if i <= len(explanations):
                          exp = explanations[i-1]
                          priority = exp.get('priority_score', 0)
                          print(f"      Priority: {priority:.2f}/1.0")
                          print(f"      Evidence: {exp.get('evidence', 'No evidence')}")
                          print(f"      Reasoning: {exp.get('reasoning', 'No reasoning')}")
          
          except urllib.error.URLError as e:
              print(f"\n[WARN] Smart Engine API unavailable ({e.reason})")
              fallback_used = True
          except urllib.error.HTTPError as e:
              print(f"\n[WARN] Smart Engine API error: HTTP {e.code}")
              try:
                  print(f"   Response: {e.read().decode('utf-8')}")
              except:
                  pass
              fallback_used = True
          except Exception as e:
              print(f"\n[WARN] Error calling Smart Engine: {type(e).__name__}: {e}")
              fallback_used = True
          
          # Fallback to simple mapping if API unavailable
          if fallback_used or not selected_tests:
              print("\n[FALLBACK] Using file-based test mapping:")
              file_to_test_map = {
                  "src/pages/login.page.js": "tests/login.spec.js",
                  "src/pages/signup.page.js": "tests/signup.spec.js",
                  "src/pages/about-us.page.js": "tests/about-us.spec.js",
                  "src/pages/contact-us.page.js": "tests/contact-us.spec.js",
                  "src/pages/base.page.js": "tests/pom-smoke.spec.js",
              }
              
              selected_tests = set()
              for changed_file in changed_files:
                  # Exact page object mapping
                  if changed_file in file_to_test_map:
                      test = file_to_test_map[changed_file]
                      selected_tests.add(test)
                      print(f"   - {changed_file} -> {test}")
                  # Direct test file changes
                  elif changed_file.startswith("tests/") and changed_file.endswith(".spec.js"):
                      selected_tests.add(changed_file)
                      print(f"   - {changed_file} (test file)")
                  # Mock app HTML/CSS changes -> run smoke test (covers all pages)
                  elif changed_file.startswith("mock-app/") and (changed_file.endswith(".html") or changed_file.endswith(".css")):
                      selected_tests.add("tests/pom-smoke.spec.js")
                      print(f"   - {changed_file} -> smoke test (UI changed)")
                  # Other source file changes
                  elif changed_file.startswith("src/"):
                      selected_tests.add("tests/pom-smoke.spec.js")
                      print(f"   - {changed_file} -> smoke test (src changed)")
              
              if not selected_tests:
                  selected_tests = {"tests/pom-smoke.spec.js"}
                  print(f"   - Default: pom-smoke.spec.js")
              
              selected_tests = sorted(list(selected_tests))
          
          print(f"\n{'='*80}")
          print(f"[SUMMARY] FINAL SELECTION: {len(selected_tests)} test(s)")
          for test in selected_tests:
              print(f"   [+] {test}")
          print(f"{'='*80}\n")
          
          # Output for next step
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as stream:
              stream.write(f"selected_tests={' '.join(selected_tests)}\n")
              stream.write(f"fallback_mode={'true' if fallback_used else 'false'}\n")

      - name: Build executable test list
        id: plan
        shell: python
        env:
          PYTHONIOENCODING: utf-8
          SELECTED_TESTS: ${{ steps.select-tests.outputs.selected_tests }}
        run: |
          import os
          
          # Get tests from smart selection engine
          selected_tests_str = os.environ.get("SELECTED_TESTS", "")
          selected_tests = selected_tests_str.split() if selected_tests_str else ["tests/pom-smoke.spec.js"]
          
          print(f"Tests to execute: {selected_tests}")
          
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as stream:
              stream.write("selected_tests=" + " ".join(selected_tests) + "\n")

      - name: Install Playwright dependencies
        run: |
          npm install
          npx playwright install

      - name: Display test selection summary
        shell: python
        env:
          PYTHONIOENCODING: utf-8
          FALLBACK_MODE: ${{ steps.select-tests.outputs.fallback_mode }}
          SELECTED_TESTS: ${{ steps.plan.outputs.selected_tests }}
        run: |
          import os
          
          fallback = os.environ.get("FALLBACK_MODE") == "true"
          selected = os.environ.get("SELECTED_TESTS", "").split()
          
          print("\n" + "="*80)
          print("TEST EXECUTION SUMMARY")
          print("="*80)
          
          if fallback:
              print("\n[MODE] File-Based Fallback (Smart Engine unavailable)")
          else:
              print("\n[MODE] ML-Ranked Smart Selection (FAISS + Llama 3.1 + scikit-learn)")
          
          print(f"\n[TESTS] Tests to Execute ({len(selected)}):")
          for i, test in enumerate(selected, 1):
              print(f"   {i}. {test}")
          
          print("\n" + "="*80 + "\n")

      - name: Execute selected tests
        run: |
          npx playwright test ${{ steps.plan.outputs.selected_tests }}

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
