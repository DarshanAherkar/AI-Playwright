name: Smoke Test Runner with Smart Selection

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number
        required: true
        type: string
      pr_title:
        description: Pull request title
        required: true
        type: string
      pr_url:
        description: Pull request URL
        required: true
        type: string
      source_repo:
        description: Source repository
        required: true
        type: string
      head_sha:
        description: Source commit SHA
        required: true
        type: string

jobs:
  smart-test-run:
    runs-on: self-hosted

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout tester repository
        uses: actions/checkout@v4

      - name: Checkout smart engine repository
        uses: actions/checkout@v4
        with:
          repository: DarshanAherkar/AI-Testing
          path: engine-src

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install engine dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r engine-src/smart-test-engine/requirements.txt

      - name: Fetch changed files from source PR
        id: changed-files
        shell: python
        run: |
          import json
          import os
          import urllib.error
          import urllib.request

          repo = os.environ["SOURCE_REPO"]
          token = os.environ.get("SOURCE_REPO_TOKEN", "")
          pr_number = os.environ["PR_NUMBER"]
          url = f"https://api.github.com/repos/{repo}/pulls/{pr_number}/files?per_page=100"

          headers = {
            "Accept": "application/vnd.github+json",
            "User-Agent": "smart-test-selection-runner"
          }
          if token:
            headers["Authorization"] = f"Bearer {token}"

          changed = []
          page = 1
          try:
            while True:
              request = urllib.request.Request(f"{url}&page={page}", headers=headers)
              with urllib.request.urlopen(request) as response:
                payload = json.loads(response.read().decode("utf-8"))
              if not payload:
                break
              changed.extend(item["filename"] for item in payload if item.get("filename"))
              if len(payload) < 100:
                break
              page += 1
          except urllib.error.HTTPError as exc:
            print(f"Warning: PR file fetch failed with HTTP {exc.code}; continuing with empty change list")
          except Exception as exc:
            print(f"Warning: PR file fetch failed ({exc}); continuing with empty change list")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as stream:
            stream.write(f"changed_files={','.join(changed)}\n")
        env:
          SOURCE_REPO: ${{ github.event.inputs.source_repo }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          SOURCE_REPO_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: Run smart selection engine
        id: select-tests
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}/engine-src/smart-test-engine/src
        run: |
          if [ -f "engine-src/smart-test-engine/data/test_catalog.json" ]; then
            python -m engine.cli \
              --pr-number "${{ github.event.inputs.pr_number }}" \
              --title "${{ github.event.inputs.pr_title }}" \
              --description "PR: ${{ github.event.inputs.pr_url }}" \
              --changed-files "${{ steps.changed-files.outputs.changed_files }}" \
              --catalog "engine-src/smart-test-engine/data/test_catalog.json" \
              --output "smart-test-plan.json"
          else
            echo "Catalog not found, creating default plan..."
            echo '{"execution_plan": {"must_run": [{"execution_targets": ["tests/pom-smoke.spec.js"]}]}}' > smart-test-plan.json
          fi

      - name: Build executable test list
        id: plan
        shell: python
        run: |
          import json
          import os
          from pathlib import Path

          try:
              if Path("smart-test-plan.json").exists():
                  plan = json.loads(Path("smart-test-plan.json").read_text(encoding="utf-8"))
                  tests = []
                  for bucket in ("must_run", "high_priority", "optional"):
                      for item in plan.get("execution_plan", {}).get(bucket, []):
                          tests.extend(item.get("execution_targets", []))
                  unique_tests = list(dict.fromkeys(tests))
              else:
                  unique_tests = []
          except Exception as e:
              print(f"Warning: Failed to parse plan: {e}")
              unique_tests = []
          
          if not unique_tests:
              unique_tests = ["tests/pom-smoke.spec.js"]
          
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as stream:
              stream.write("selected_tests=" + " ".join(unique_tests) + "\n")

      - name: Install Playwright dependencies
        run: |
          npm install
          npx playwright install

      - name: Execute selected tests
        run: |
          npx playwright test ${{ steps.plan.outputs.selected_tests }}

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
