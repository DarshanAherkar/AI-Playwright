name: Smoke Test Runner with Smart Selection

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number
        required: false
        type: string
      pr_title:
        description: Pull request title
        required: false
        type: string
      pr_url:
        description: Pull request URL
        required: false
        type: string
      source_repo:
        description: Source repository
        required: false
        type: string
      head_sha:
        description: Source commit SHA
        required: false
        type: string

jobs:
  smart-test-selection:
    name: Select Tests Using Smart Engine
    runs-on: ubuntu-latest
    outputs:
      selected_tests: ${{ steps.select-tests.outputs.selected_tests }}
      test_plan: ${{ steps.select-tests.outputs.test_plan }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Select tests using smart engine
        id: select-tests
        run: |
          # Default: run smoke tests if no PR info provided
          if [ -z "${{ github.event.inputs.source_repo }}" ]; then
            echo "selected_tests=tests/pom-smoke.spec.js" >> $GITHUB_OUTPUT
            echo "test_plan=Running default smoke test suite" >> $GITHUB_OUTPUT
          else
            # When smart test engine is available, it will select tests based on PR changes
            echo "selected_tests=tests/pom-smoke.spec.js tests/login.spec.js tests/signup.spec.js" >> $GITHUB_OUTPUT
            echo "test_plan=Selected tests based on PR impact analysis: pom-smoke, login, signup flows" >> $GITHUB_OUTPUT
          fi

  execute-smoke-tests:
    name: Execute Selected Smoke Tests
    needs: smart-test-selection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install

      - name: Log test plan
        run: |
          echo "PR Number: ${{ github.event.inputs.pr_number }}"
          echo "PR Title: ${{ github.event.inputs.pr_title }}"
          echo "PR URL: ${{ github.event.inputs.pr_url }}"
          echo "Source Repo: ${{ github.event.inputs.source_repo }}"
          echo "Head SHA: ${{ github.event.inputs.head_sha }}"
          echo "---"
          echo "Test Plan: ${{ needs.smart-test-selection.outputs.test_plan }}"

      - name: Run selected smoke tests
        run: |
          npx playwright test ${{ needs.smart-test-selection.outputs.selected_tests }}

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Publish test results
        if: always()
        run: |
          echo "Test execution completed"
          echo "Selected tests: ${{ needs.smart-test-selection.outputs.selected_tests }}"