<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page-card">
      <h1>Payment</h1>
      <form id="paymentForm">
        <label>Card Number <input name="cardNumber" type="text" required /></label>
        <label>Expiry <input name="expiry" type="text" required /></label>
        <label>CVV <input name="cvv" type="text" required /></label>
        <button type="submit">Pay Now</button>
      </form>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
